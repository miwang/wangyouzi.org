<!DOCTYPE html>
<html>
  <head>
    <title>柚子的探索空间</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; }
      #landing-page {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); /* 渐变蓝背景 */
        font-family: sans-serif;
        color: #333;
        z-index: 1; /* 在 3D 场景之上 */
        pointer-events: none; /* 让鼠标穿透，可以操作 3D 场景 */
      }
      h1 { font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); pointer-events: auto;}
      p { font-size: 1.2em; pointer-events: auto;}
    </style>
  </head>
  <body>
    <div id="landing-page">
      <h1>你好，我是Youzi Wang！</h1>
      <p>这是我的第一个网站。</p>
    </div>

    <a-scene embedded style="height: 100vh; width: 100vw;">
      <a-sky color="#ECECEC"></a-sky>

      <a-light type="ambient" color="#FFF"></a-light>
      <a-light type="directional" position="-1 2 1" intensity="0.5"></a-light>

      <a-box 
        position="0 1.5 -3" 
        rotation="0 45 0" 
        width="1" height="1" depth="0.1"
        material="src: avatar.png;" 
        animation="property: rotation; to: 0 405 0; loop: true; dur: 10000; easing: linear">
      </a-box>

      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4" shadow></a-plane>

      <a-entity camera position="0 1.6 0" look-controls></a-entity>
    </a-scene>
  </body>
</html>
